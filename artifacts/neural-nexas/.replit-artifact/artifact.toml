kind = "web"
previewPath = "/"
title = "Neural Nexas - Healthcare"
version = "1.0.0"
id = "artifacts/neural-nexas"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22132

[services.development]
run = "pnpm --filter @workspace/neural-nexas run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/neural-nexas", "run", "build" ]
publicDir = "artifacts/neural-nexas/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22132"
BASE_PATH = "/"
